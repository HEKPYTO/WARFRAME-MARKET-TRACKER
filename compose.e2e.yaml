services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: warframe_market_tracker
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warframe_market_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro,z

  web:
    build:
      context: .
      dockerfile: ./docker/web.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: test
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/warframe_market_tracker
      APP_SECRETS_MASTER_KEY: ${APP_SECRETS_MASTER_KEY}
      ENABLE_DEV_RESET: "true"
      HOST: 0.0.0.0
      INTERNAL_ORIGIN: http://127.0.0.1:3000
      NODE_ENV: test
      PORT: "3000"
      SKIP_MARKET_VALIDATION: "true"
      TZ: Asia/Bangkok
    ports:
      - "3001:3000"
